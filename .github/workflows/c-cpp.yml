name: Build and Test OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: ilammy/setup-nasm@v1.5.2
    - uses: docker/setup-qemu-action@v3.6.0
    - uses: actions/checkout@v4
    - name: make
      run: make
    - name: make test
      run: make test
